<html>
<head>
	<title></title>
	<meta charset="utf-8">
	<meta name="renderer" content="webkit|ie-comp|ie-stand">
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
	<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1.0,maximum-scale=1.0,user-scalable=no" />
	<meta http-equiv="Cache-Control" content="no-siteapp" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge" />
	<link rel="stylesheet" type="text/css" href="css/common.css">
	<link rel="stylesheet" type="text/css" href="css/public.css">
</head>
<body>
<!-- head -->
<div class="head_box">
	<div class="head_info">
		<div class="head_left"></div>
		<div class="head_right">
			<div class="head_right_tel">
				<img src="images/head_tel.png">
				<span class="head_tel_word">全国咨询热线：</span>
				<span class="head_tel_num">0571-86752285</span>
			</div>
			<div class="head_right_nav">
				<span class="head_nav_ck"><a href="index.html" target="ifr-con">首页</a></span>
				<span><a href="about.html" target="ifr-con">关于我们</a></span>
				<span><a href="index.html" target="ifr-con">服务内容</a></span>
				<span><a href="index.html" target="ifr-con">会议内容</a></span>
				<span><a href="index.html" target="ifr-con">招聘信息</a></span>
				<span><a href="index.html" target="ifr-con">联系我们</a></span>
				<div class="clear"></div>
			</div>
		</div>
		<div class="clear"></div>
	</div>
</div>

<!-- con -->
<div class="con_box">
	<iframe src="index.html" name="ifr-con" id="ifr-con" class="ifr-con" width="100%"></iframe>
</div>


<script type="text/javascript" src="js/jquery-1.10.2.min.js"></script>
<script type="text/javascript">
$(function(){

	$(".head_right_nav .head_nav_ck").click(function(){
		$("#ifr-con").attr("src",$(this).find("a").attr("href"));
	});

	// $(".con_box").height($(document).height()-$(".head_box").height());

	$(".head_right_nav span").click(function(){
		$(".head_right_nav span").removeClass("head_nav_ck");
		$(this).addClass("head_nav_ck");
	});
});
</script>
</body>
</html>
