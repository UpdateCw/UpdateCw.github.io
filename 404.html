var geoCoordMap = {
	  '自贡':[104.78,29.35],
	  '都江堰':[103.64,30.98],
	  '九龙山':[104.15,31.40],

		'牛背山':[102.3,29.75],
		'康定':[101.9,30.04],
		'泸定':[102.23,29.9],
};

var convertData = function (data) {
		var res = [];
		for (var i = 0; i < data.length; i++) {
				var geoCoord = geoCoordMap[data[i].name];
				if (geoCoord) {
						res.push({
								name: data[i].name,
								value: geoCoord.concat(data[i].value)
						});
				}
		}
		return res;
};

option = {
